name: Generate Serverfarm campaign PDFs

on:
  push:
    branches: [main]
    paths:
      - .generate-pdfs-trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash .ci/generate-pdfs.sh
