name: Export official Serverfarm identity
on:
  push:
    branches: [main]
    paths:
      - .export-logo-trigger
permissions:
  contents: write
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl --fail --location --retry 4 --retry-delay 2 'https://www.serverfarmllc.com/wp-content/uploads/elementor/thumbs/Serverfarm-Logo-qqtqcc9wnm4wrmbc39le0rosoixmpaf6v0v3ul7f8u.jpg' -o /tmp/serverfarm-logo.jpg
          test "$(stat -c%s /tmp/serverfarm-logo.jpg)" -ge 1000
          base64 -w0 /tmp/serverfarm-logo.jpg > official-serverfarm-logo.b64
          printf '\n' >> official-serverfarm-logo.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add official-serverfarm-logo.b64
          git commit -m 'Stage official Serverfarm identity asset'
          git push
