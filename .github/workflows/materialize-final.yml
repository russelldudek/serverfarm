name: Materialize final candidate campaign
on:
  push:
    branches: [main]
    paths:
      - .materialize-final-trigger
permissions:
  contents: write
jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Replace temporary shell with audited campaign
        shell: bash
        run: |
          set -euo pipefail
          cat .payload/v2.part*.b64 | base64 --decode > /tmp/serverfarm-v2.tar.gz
          echo '10697929f64f80eb81e2e8cca66c59d3c5a81a3f70437dfd29d6e2a1690f3b83  /tmp/serverfarm-v2.tar.gz' | sha256sum --check --status
          rm -rf /tmp/campaign && mkdir -p /tmp/campaign
          tar -xzf /tmp/serverfarm-v2.tar.gz -C /tmp/campaign
          mkdir -p /tmp/campaign/assets/brand
          base64 --decode official-serverfarm-logo.b64 > /tmp/campaign/assets/brand/serverfarm-logo.jpg
          test "$(stat -c%s /tmp/campaign/assets/brand/serverfarm-logo.jpg)" -eq 4156
          cat > /tmp/campaign/assets/brand/README.md <<'EOF'
          # Serverfarm brand asset

          - File: `serverfarm-logo.jpg`
          - Source: official Serverfarm website asset
          - Source URL: `https://www.serverfarmllc.com/wp-content/uploads/elementor/thumbs/Serverfarm-Logo-qqtqcc9wnm4wrmbc39le0rosoixmpaf6v0v3ul7f8u.jpg`
          - Retrieval date: 2026-07-15
          - Treatment: unmodified local copy used only for nominative employer identification
          - Context: independent candidate vision by Russell Dudek; not affiliated with or endorsed by Serverfarm
          EOF
          python - <<'PY'
          from pathlib import Path
          p=Path('/tmp/campaign/brand-intelligence.md')
          s=p.read_text(encoding='utf-8')
          s=s.replace('The publication workflow retrieves Serverfarm\'s publicly served identity asset from the company\'s official website and commits it locally at `assets/brand/serverfarm-logo.jpg` for nominative employer identification.', 'The unmodified official Serverfarm identity asset is locally committed at `assets/brand/serverfarm-logo.jpg` for nominative employer identification.')
          s=s.replace('The official asset is sourced from Serverfarm\'s public website and will be committed locally before final audit.', 'The official asset is sourced from Serverfarm\'s public website and is committed locally with provenance.')
          p.write_text(s,encoding='utf-8')
          PY
          touch /tmp/campaign/.nojekyll
          cd "$GITHUB_WORKSPACE"
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a /tmp/campaign/ ./
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish audited Serverfarm candidate campaign'
          git push origin main
