name: Observable Serverfarm publisher
on:
  push:
    branches: [main]
    paths:
      - .publisher-status-trigger
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash .payload/publish-with-status.sh
