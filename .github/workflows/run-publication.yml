name: Run traced candidate campaign publication
on:
  push:
    branches: [main]
    paths:
      - .run-publication
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run traced publication
        shell: bash
        run: |
          set +e
          bash -x .payload/publish.sh >/tmp/bootstrap-full.log 2>&1
          rc=$?
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          git reset --hard HEAD
          git clean -fd
          tail -c 60000 /tmp/bootstrap-full.log > bootstrap-full.log
          printf '\nexit_code=%s\n' "$rc" >> bootstrap-full.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bootstrap-full.log
          git commit -m 'Record candidate campaign publication failure'
          git pull --rebase origin main
          git push origin main
          exit "$rc"
