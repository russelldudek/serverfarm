name: Verify automation path
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  marker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          printf 'automation active\n' > .automation-active
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .automation-active
          git diff --cached --quiet || git commit -m 'Verify candidate campaign automation'
          git push
