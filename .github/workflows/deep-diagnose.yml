name: Deep publication preflight
on:
  push:
    branches: [main]
    paths:
      - .deep-diagnose-trigger
permissions:
  contents: write
jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute staged campaign preflight
        shell: bash
        run: |
          set +e
          report=/tmp/deep-diagnostic.txt
          : > "$report"
          stamp(){ printf '%s=%s\n' "$1" "$2" >> "$report"; }
          cat .payload/v2.part*.b64 | base64 --decode > /tmp/serverfarm-v2.tar.gz
          stamp base64_rc $?
          sha=$(sha256sum /tmp/serverfarm-v2.tar.gz | awk '{print $1}')
          stamp archive_sha "$sha"
          rm -rf /tmp/campaign && mkdir -p /tmp/campaign
          tar -xzf /tmp/serverfarm-v2.tar.gz -C /tmp/campaign
          stamp extract_rc $?
          mkdir -p /tmp/campaign/assets/brand /tmp/campaign/docs
          curl --fail --location --retry 3 'https://www.serverfarmllc.com/wp-content/uploads/elementor/thumbs/Serverfarm-Logo-qqtqcc9wnm4wrmbc39le0rosoixmpaf6v0v3ul7f8u.jpg' -o /tmp/campaign/assets/brand/serverfarm-logo.jpg
          stamp logo_rc $?
          stamp logo_bytes "$(stat -c%s /tmp/campaign/assets/brand/serverfarm-logo.jpg 2>/dev/null || echo 0)"
          python -m pip install --disable-pip-version-check weasyprint pypdf beautifulsoup4 playwright >/tmp/pip.log 2>&1
          stamp pip_rc $?
          cd /tmp/campaign
          weasyprint resume.html docs/russell-dudek-serverfarm-resume.pdf >/tmp/pdf-resume.log 2>&1; stamp pdf_resume_rc $?
          weasyprint cover-letter.html docs/russell-dudek-serverfarm-cover-letter.pdf >/tmp/pdf-cover.log 2>&1; stamp pdf_cover_rc $?
          weasyprint interview-brief.html docs/serverfarm-interview-thesis-brief.pdf >/tmp/pdf-brief.log 2>&1; stamp pdf_brief_rc $?
          weasyprint 120-day-plan.html docs/serverfarm-120-day-entry-plan.pdf >/tmp/pdf-plan.log 2>&1; stamp pdf_plan_rc $?
          weasyprint campus-paralleling-review.html docs/serverfarm-campus-paralleling-review.pdf >/tmp/pdf-review.log 2>&1; stamp pdf_review_rc $?
          python scripts/qa.py >/tmp/qa.log 2>&1; stamp qa_rc $?
          python -m playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1; stamp playwright_install_rc $?
          python -m http.server 4173 >/tmp/http.log 2>&1 & server_pid=$!
          sleep 2
          python - <<'PY' >/tmp/browser.log 2>&1
          from playwright.sync_api import sync_playwright
          routes=['index.html','resume.html','cover-letter.html','interview-brief.html','120-day-plan.html','campus-paralleling-review.html']
          with sync_playwright() as p:
              b=p.chromium.launch()
              for w,h in [(1440,900),(1280,800),(768,1024),(390,844)]:
                  page=b.new_page(viewport={'width':w,'height':h})
                  for route in routes:
                      page.goto('http://127.0.0.1:4173/'+route,wait_until='networkidle')
                      assert not page.evaluate('document.documentElement.scrollWidth > document.documentElement.clientWidth'), (route,w,h)
                  page.close()
              page=b.new_page(viewport={'width':1280,'height':800})
              page.goto('http://127.0.0.1:4173/index.html',wait_until='networkidle')
              before=page.locator('#stateStatus').inner_text()
              page.locator('[data-scenario="alarm"]').click()
              after=page.locator('#stateStatus').inner_text()
              assert before != after and ('Hold' in after or 'Escalate' in after), (before,after)
              page.emulate_media(reduced_motion='reduce')
              assert page.evaluate("getComputedStyle(document.querySelector('.bus.growth'),'::after').animationName") == 'none'
              b.close()
          PY
          browser_rc=$?
          kill "$server_pid" 2>/dev/null
          stamp browser_rc "$browser_rc"
          cd "$GITHUB_WORKSPACE"
          for f in /tmp/pip.log /tmp/pdf-resume.log /tmp/pdf-cover.log /tmp/pdf-brief.log /tmp/pdf-plan.log /tmp/pdf-review.log /tmp/qa.log /tmp/playwright-install.log /tmp/browser.log; do
            echo "--- ${f##*/} ---" >> "$report"
            tail -c 5000 "$f" >> "$report" 2>/dev/null
            echo >> "$report"
          done
          cp "$report" deep-diagnostic.txt
      - name: Commit preflight report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deep-diagnostic.txt
          git diff --cached --quiet || git commit -m 'Record candidate campaign deep preflight'
          git push
