name: Verify isolated automation
on:
  push:
    branches: [main]
    paths:
      - .smoke2-trigger
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          printf 'isolated automation active\n' > isolated-automation-active.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add isolated-automation-active.txt
          git commit -m 'Verify isolated candidate campaign automation'
          git push
