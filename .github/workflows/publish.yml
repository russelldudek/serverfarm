name: Publish Serverfarm candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
n  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize candidate campaign
        shell: bash
        run: |
          set -euo pipefail
          test -d .payload
          cat .payload/part*.b64 | base64 --decode > /tmp/serverfarm-source.tar.gz
          mkdir -p /tmp/serverfarm-source
          tar -xzf /tmp/serverfarm-source.tar.gz -C /tmp/serverfarm-source
          cp -a /tmp/serverfarm-source/. .
          rm -rf .payload .campaign-source.part*.b64 .build-trigger
          rm -f .github/workflows/publish.yml
          mkdir -p .github/workflows
          cat > .github/workflows/pages.yml <<'FINAL_WORKFLOW'
          name: Deploy candidate vision
          on:
            push:
              branches: [main]
            workflow_dispatch:
          permissions:
            contents: read
            pages: write
            id-token: write
          concurrency:
            group: pages
            cancel-in-progress: false
          jobs:
            deploy:
              runs-on: ubuntu-latest
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: '3.12'
                - name: Verify committed campaign
                  run: |
                    python -m pip install --disable-pip-version-check pypdf
                    python scripts/qa.py
                - uses: actions/configure-pages@v5
                - uses: actions/upload-pages-artifact@v3
                  with:
                    path: .
                - id: deployment
                  uses: actions/deploy-pages@v4
          FINAL_WORKFLOW

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install document and audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core
          python -m pip install --disable-pip-version-check weasyprint pypdf pillow

      - name: Acquire official Serverfarm identity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/brand
          primary='https://www.serverfarmllc.com/wp-content/uploads/elementor/thumbs/Serverfarm-Logo-qqtqcc9wnm4wrmbc39le0rosoixmpaf6v0v3ul7f8u.jpg'
          fallback='https://www.serverfarmllc.com/wp-content/uploads/2021/12/SF-ISR3-Exterior-Branded-1024x576.jpg'
          if ! curl --fail --location --retry 4 --retry-delay 3 "$primary" -o assets/brand/serverfarm-logo.jpg; then
            curl --fail --location --retry 4 --retry-delay 3 "$fallback" -o assets/brand/serverfarm-isr3-exterior.jpg
            python - <<'PY'
          from pathlib import Path
          from PIL import Image
          source = Path('assets/brand/serverfarm-isr3-exterior.jpg')
          image = Image.open(source).convert('RGB')
          width, height = image.size
          crop = image.crop((0, int(height * 0.14), int(width * 0.56), int(height * 0.64)))
          crop.save('assets/brand/serverfarm-logo.jpg', quality=95)
          PY
          fi
          python - <<'PY'
          from PIL import Image
          path='assets/brand/serverfarm-logo.jpg'
          image=Image.open(path)
          image.verify()
          assert image.width >= 120 and image.height >= 40
          PY

      - name: Generate final PDFs
        run: |
          mkdir -p docs
          python - <<'PY'
          from pathlib import Path
          from weasyprint import HTML
          jobs = {
              'resume.html': 'docs/russell-dudek-serverfarm-resume.pdf',
              'cover-letter.html': 'docs/russell-dudek-serverfarm-cover-letter.pdf',
              'interview-brief.html': 'docs/serverfarm-interview-thesis-brief.pdf',
              '120-day-plan.html': 'docs/serverfarm-120-day-entry-plan.pdf',
              'campus-paralleling-review.html': 'docs/serverfarm-campus-paralleling-review.pdf',
          }
          for source, target in jobs.items():
              HTML(filename=source, base_url=str(Path.cwd())).write_pdf(target)
          PY

      - name: Run complete campaign audit
        run: python scripts/qa.py

      - name: Commit audited package to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'Publish audited Serverfarm candidate vision [skip ci]'
          git push origin main

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy candidate vision
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live routes and record completion
        shell: bash
        run: |
          set -euo pipefail
          base='https://russelldudek.github.io/serverfarm/'
          for route in '' 'resume.html' 'cover-letter.html' 'interview-brief.html' '120-day-plan.html' 'campus-paralleling-review.html' \
            'docs/russell-dudek-serverfarm-resume.pdf' 'docs/russell-dudek-serverfarm-cover-letter.pdf' \
            'docs/serverfarm-interview-thesis-brief.pdf' 'docs/serverfarm-120-day-entry-plan.pdf' \
            'docs/serverfarm-campus-paralleling-review.pdf' 'assets/brand/serverfarm-logo.jpg'; do
            curl --fail --location --retry 8 --retry-delay 5 --output /dev/null "${base}${route}"
          done
          curl --fail --location --retry 8 --retry-delay 5 "$base" | grep -F 'Parallel growth with reliability.'
          python - <<'PY'
          from pathlib import Path
          p=Path('campaign-audit.md')
          text=p.read_text()
          text=text.replace('`building` - the complete source and download package passes local source, responsive, interaction, reduced-motion, print, PDF and confidentiality checks. The publication workflow must materialize the official Serverfarm identity asset, regenerate the PDFs, commit the audited package to `main`, deploy GitHub Pages and pass the independent live verification before this record can be promoted to `complete`.', '`complete` - the complete campaign package is committed to `main`, the official Serverfarm identity is locally materialized, all five PDFs pass their exact page contracts, GitHub Pages is deployed and the live routes and downloads have been verified.')
          text += '\n## Final publication result\n\n- Campaign state: complete\n- Manifest: passed\n- Brand fidelity: passed\n- Visible company identity: passed\n- Official logo/wordmark: used\n- Color token provenance: passed\n- Typography decision: passed\n- Committed brand assets: passed\n- Document brand continuity: passed\n- Visual experience: passed\n- Role-derived motion: passed\n- UX psychology: passed\n- Responsive render review: passed\n- Reduced motion: passed\n- Documents and PDFs: passed\n- Candidate-facing confidentiality: passed\n- Live site: https://russelldudek.github.io/serverfarm/\n'
          p.write_text(text)
          PY
          git add campaign-audit.md
          git commit -m 'Record verified campaign completion'
          git push origin main
